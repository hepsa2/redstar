<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>博客</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
:root{--red:#b30000;--lightred:#ffd6d6;}
body{margin:0;font-family:"Noto Sans SC",sans-serif;background:var(--lightred);color:#222;overflow-x:hidden;}
/* 红星背景 */
.star-bg{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:120vw;color:#ffd700;opacity:0.08;z-index:-1;pointer-events:none;}
/* 页面主体 */
.container{max-width:900px;margin:auto;padding:20px;}
/* 返回按钮 */
.back{margin-bottom:20px;}.back a{color:#900;text-decoration:none;font-size:18px;}.back a:hover{color:#b30000;}
/* 栏目 */
.category{background:white;border-left:6px solid var(--red);border-radius:8px;padding:18px;margin-bottom:18px;cursor:pointer;}.category h2{margin:0;color:#8b0000;}
/* 文章列表 */
.post-list{display:none;margin-top:12px;}.post-list a{display:block;padding:8px 0;color:#333;text-decoration:none;}.post-list a:hover{color:#b30000;}
/* 文章内容 */
#content{background:white;padding:25px;border-radius:10px;box-shadow:0 6px 18px rgba(0,0,0,0.15);line-height:1.8;}
.related{margin-top:50px;border-top:2px solid #b30000;padding-top:20px;}
/* 新增说明区 */
.intro{background:white;border-radius:10px;padding:20px;margin-top:25px;box-shadow:0 6px 16px rgba(0,0,0,0.15);line-height:1.9;font-size:18px;}
.intro img{margin-top:15px;border-radius:6px;}
/* 群众论坛按钮 */
.forum-btn{display:block;margin:20px 0;padding:12px 24px;background:var(--red);color:white;text-decoration:none;text-align:center;border-radius:6px;font-size:18px;}
.forum-btn:hover{background:#900;}
img{max-width:100%;}
@media(max-width:600px){.container{padding:15px;}#content{font-size:16px;}}
</style>
</head>
<body>
<div class="star-bg">★</div>
<div class="container">
    <div class="back"><a href="index.html">← 返回主页</a></div>
    <div id="main"></div>
</div>
<script>
/* GitHub仓库 */
const repo = "hepsa2/mlmpm";

/* 栏目配置 */
const categories = {
    A: { title: "时事评论/组织实践", folder: "postsA" },
    B: { title: "理论分析/名著解读", folder: "postsB" },
    C: { title: "国际视野/文艺阵线", folder: "postsC" }
};

const params = new URLSearchParams(location.search);
const cat    = params.get("cat");
const post   = params.get("post");
const main   = document.getElementById("main");

if (cat && post) { loadPost(cat, post); }
else { showCategories(); }

/* ── 显示栏目列表 ── */
async function showCategories() {
    let html = "<h1>博客栏目</h1>";
    for (let key in categories) {
        let c = categories[key];
        html += `<div class="category" onclick="toggle('${key}')">
                   <h2>${c.title}</h2>
                   <div class="post-list" id="list-${key}">加载中...</div>
                 </div>`;
    }
    html += `<a class="forum-btn" href="submit.html">群众论坛 → 投稿/讨论</a>`;
    html += `<div class="intro">
        <p>马克思主义教导我们解决问题的关键在于如何应用普遍真理。如果不把马克思列宁毛主义应用到具体实际中，就不可能领导革命，就不可能改造、破坏旧秩序或创造新秩序。  ——————贡萨罗主席</p>
        <img src="00.jpg">
    </div>`;
    main.innerHTML = html;

    for (let key in categories) { loadPosts(key); }
}

/* ── 从文本中提取标题（兼容 YAML front matter 和 # 标题两种格式）── */
function extractTitle(text, fallback) {
    // 优先：YAML front matter 的 title 字段
    // 格式：title: "文章标题"  或  title: 文章标题
    const yamlMatch = text.match(/^---[\s\S]*?^title:\s*["']?(.+?)["']?\s*$/m);
    if (yamlMatch) return yamlMatch[1].trim();

    // 降级：Markdown # 标题（手动上传的旧文件）
    const mdMatch = text.match(/^#\s+(.*)/m);
    if (mdMatch) return mdMatch[1].trim();

    // 兜底：文件名
    return fallback;
}

/* ── 去掉 YAML front matter，只返回正文部分 ── */
function stripFrontMatter(text) {
    // 匹配开头的 --- ... --- 块
    return text.replace(/^---[\s\S]*?---\n?/, "").trim();
}

/* ── 读取某栏目下的文章列表 ── */
async function loadPosts(key) {
    const folder = categories[key].folder;
    const list   = document.getElementById("list-" + key);
    try {
        const res  = await fetch(`https://api.github.com/repos/${repo}/contents/${folder}`);
        const data = await res.json();

        if (!Array.isArray(data)) {
            list.innerHTML = "<span style='color:#999;font-size:14px'>暂无文章</span>";
            return;
        }

        const mdFiles = data.filter(f => f.name.endsWith(".md"));
        if (mdFiles.length === 0) {
            list.innerHTML = "<span style='color:#999;font-size:14px'>暂无文章</span>";
            return;
        }

        list.innerHTML = "";
        for (const file of mdFiles) {
            const name = file.name.replace(".md", "");
            const raw  = `https://raw.githubusercontent.com/${repo}/main/${folder}/${file.name}`;
            const text = await fetch(raw).then(r => r.text());
            const title = extractTitle(text, name);

            const a  = document.createElement("a");
            a.href      = `?cat=${key}&post=${encodeURIComponent(name)}`;
            a.innerText = title;
            list.appendChild(a);
        }
    } catch (e) {
        list.innerHTML = "<span style='color:#999;font-size:14px'>加载失败，请稍后重试</span>";
    }
}

/* ── 展开/收起栏目 ── */
function toggle(id) {
    const el = document.getElementById("list-" + id);
    el.style.display = el.style.display === "block" ? "none" : "block";
}

/* ── 加载并渲染文章 ── */
async function loadPost(cat, id) {
    const folder = categories[cat] ? categories[cat].folder : "postsA";
    const url    = `https://raw.githubusercontent.com/${repo}/main/${folder}/${decodeURIComponent(id)}.md`;
    const res    = await fetch(url);

    if (!res.ok) {
        main.innerHTML = `<div id="content"><p style="color:#900">文章加载失败，请返回重试。</p></div>`;
        return;
    }

    const md      = await res.text();
    const title   = extractTitle(md, id);
    const body    = stripFrontMatter(md);   // 渲染时去掉 front matter，避免显示 --- 块

    // 若正文没有 # 标题，自动在顶部插入标题
    const hasH1   = /^#\s+/m.test(body);
    const rendered = marked.parse(hasH1 ? body : `# ${title}\n\n${body}`);

    main.innerHTML = `<div id="content">${rendered}</div><div id="comments"></div>`;
    loadComments();
}

/* ── 评论系统（giscus）── */
function loadComments() {
    const script = document.createElement("script");
    script.src   = "https://giscus.app/client.js";
    script.setAttribute("data-repo",               "hepsa2/mlmpm");
    script.setAttribute("data-mapping",            "pathname");
    script.setAttribute("data-category",           "General");
    script.setAttribute("data-reactions-enabled",  "1");
    script.setAttribute("data-theme",              "light");
    script.setAttribute("data-lang",               "zh-CN");
    script.async = true;
    document.getElementById("comments").appendChild(script);
}
</script>
</body>
</html>
