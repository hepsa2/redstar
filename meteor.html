<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>最新文章</title>

<style>

body{
background:#f7f7f7;
font-family:"Noto Sans SC",sans-serif;
margin:0;
}

.blog-section{
max-width:1100px;
margin:80px auto;
padding:20px;
}

.blog-title{
font-size:32px;
color:#8b0000;
margin-bottom:30px;
text-align:center;
}

#blog-cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:22px;
}

.blog-card{
background:white;
padding:22px;
border-radius:12px;
box-shadow:0 10px 30px rgba(0,0,0,0.12);
transition:0.25s;
display:flex;
flex-direction:column;
justify-content:space-between;
}

.blog-card:hover{
transform:translateY(-6px);
box-shadow:0 16px 40px rgba(0,0,0,0.18);
}

.blog-card h3{
font-size:18px;
margin-bottom:10px;
color:#222;
}

.blog-date{
font-size:13px;
color:#777;
margin-bottom:12px;
}

.blog-card a{
margin-top:auto;
text-decoration:none;
color:white;
background:#b30000;
padding:8px 14px;
border-radius:6px;
font-size:14px;
align-self:flex-start;
}

.blog-card a:hover{
background:#900;
}

.more-blog{
display:block;
text-align:center;
margin-top:40px;
font-size:16px;
text-decoration:none;
color:#b30000;
}

.more-blog:hover{
text-decoration:underline;
}

</style>
</head>

<body>

<section class="blog-section">

<h2 class="blog-title">最新文章</h2>

<div id="blog-cards">
加载中...
</div>

<a href="https://paper.wf/meteor" class="more-blog" target="_blank">
查看全部文章 →
</a>

</section>

<script>

const feedURL = "https://paper.wf/meteor/feed/";

fetch(feedURL)

.then(response => response.text())

.then(str => new DOMParser().parseFromString(str,"text/xml"))

.then(data => {

const items = data.querySelectorAll("item");

let html = "";

items.forEach((el,i)=>{

if(i<5){

const title = el.querySelector("title").textContent;

const link = el.querySelector("link").textContent;

const date = new Date(el.querySelector("pubDate").textContent);

const formattedDate =
date.getFullYear()+"-"+
String(date.getMonth()+1).padStart(2,"0")+"-"+
String(date.getDate()).padStart(2,"0");

html += `
<div class="blog-card">
<h3>${title}</h3>
<div class="blog-date">${formattedDate}</div>
<a href="${link}" target="_blank">阅读全文</a>
</div>
`;

}

});

document.getElementById("blog-cards").innerHTML = html;

})

.catch(err=>{

document.getElementById("blog-cards").innerHTML="博客加载失败";

});

</script>

</body>
</html>
