  <style>
    :root { --red:#b30000; --darkred:#7a0000; --lightred:#ffd6d6; --gold:#ffd700; }
    * { margin:0; padding:0; box-sizing:border-box; }
    body { background:var(--lightred); font-family:'Noto Sans SC',sans-serif; overflow-x:hidden; }

    #meteorCanvas { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9998; }

    .flag-bg { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); font-size:120vw; color:#ffd700; opacity:0.08; z-index:-1; pointer-events:none; user-select:none; line-height:1; }

    .menu-btn { position:fixed; top:25px; right:25px; width:55px; height:55px; background:#b30000; border-radius:10px; display:flex; flex-direction:column; justify-content:center; align-items:center; gap:6px; cursor:pointer; box-shadow:0 0 15px rgba(180,0,0,0.5); z-index:1000; }
    .menu-btn span { width:26px; height:3px; background:white; transition:0.3s; }
    .menu-btn.active span:nth-child(1) { transform:rotate(45deg) translate(6px,6px); }
    .menu-btn.active span:nth-child(2) { opacity:0; }
    .menu-btn.active span:nth-child(3) { transform:rotate(-45deg) translate(6px,-6px); }
    .menu-btn:before { content:"★"; color:#ffd700; position:absolute; top:-12px; right:-12px; font-size:20px; }

    .sidebar { position:fixed; top:0; right:0; width:350px; height:100vh; background:rgba(255,220,220,0.96); padding:100px 40px; transform:translateX(100%); transition:0.35s; border-left:2px solid #900; z-index:999; overflow-y:auto; }
    .sidebar.active { transform:translateX(0); }
    .sidebar > a, .sidebar-item > .sidebar-item-link { display:block; margin-bottom:20px; padding:14px; background:white; border-radius:8px; text-decoration:none; color:#222; transition:0.2s; font-size:15px; }
    .sidebar > a:hover, .sidebar-item > .sidebar-item-link:hover { background:#ffcccc; }
    .sidebar-item { margin-bottom:20px; position:relative; }
    .sidebar-item-link { display:flex; align-items:center; justify-content:space-between; padding:14px; background:white; border-radius:8px; text-decoration:none; color:#222; transition:background 0.2s; font-size:15px; cursor:pointer; user-select:none; }
    .sidebar-item-link:hover { background:#ffcccc; }
    .sidebar-arrow { display:inline-block; width:18px; height:18px; border-right:2px solid var(--red); border-bottom:2px solid var(--red); transform:rotate(45deg); transition:transform 0.28s cubic-bezier(0.34,1.56,0.64,1); flex-shrink:0; margin-left:8px; position:relative; top:-2px; }
    .sidebar-item.open .sidebar-arrow { transform:rotate(225deg); top:2px; }
    .sidebar-sub { overflow:hidden; max-height:0; transition:max-height 0.38s cubic-bezier(0.4,0,0.2,1), opacity 0.28s ease; opacity:0; }
    .sidebar-item.open .sidebar-sub { max-height:200px; opacity:1; }
    .sidebar-sub a { display:flex; align-items:center; gap:10px; margin-top:8px; padding:11px 14px 11px 20px; background:rgba(179,0,0,0.06); border-left:3px solid var(--red); border-radius:0 8px 8px 0; text-decoration:none; color:#5a0000; font-size:14px; transition:background 0.2s,padding-left 0.2s; }
    .sidebar-sub a:hover { background:rgba(179,0,0,0.14); padding-left:26px; }
    .sidebar-sub a::before { content:"★"; color:var(--gold); font-size:10px; flex-shrink:0; }

    .container { max-width:1100px; margin:auto; padding:60px 20px; text-align:center; }
    .hero-title { font-size:clamp(36px,8vw,90px); color:#8b0000; font-family:'Orbitron',monospace; margin-bottom:50px; }
    .image-box { max-width:750px; margin:auto; margin-bottom:40px; border-radius:20px; overflow:hidden; box-shadow:0 15px 40px rgba(0,0,0,0.2); }
    .image-box img { width:100%; display:block; }

    .pioneer-heading { max-width:750px; margin:0 auto 28px auto; font-size:clamp(26px,5vw,44px); font-weight:700; color:#6b0000; letter-spacing:0.12em; font-family:'Noto Sans SC',sans-serif; opacity:0; transform:translateY(48px); transition:opacity 1s cubic-bezier(0.22,1,0.36,1),transform 1s cubic-bezier(0.22,1,0.36,1); position:relative; }
    .pioneer-heading.show { opacity:1; transform:translateY(0); }
    .pioneer-heading::before, .pioneer-heading::after { content:''; display:inline-block; width:32px; height:2px; background:#8b0000; vertical-align:middle; margin:0 14px; opacity:0.6; }

    .story { max-width:750px; margin:auto; font-size:18px; line-height:1.9; text-align:center; }
    .story p { opacity:0; transform:translateY(28px); transition:opacity 0.7s ease,transform 0.7s ease; }
    .story p.show { opacity:1; transform:translateY(0); }

    .slogan { margin-top:200px; font-size:42px; color:#a00000; font-weight:700; opacity:0; transform:translateY(80px); transition:1.2s; }
    .slogan.show { opacity:1; transform:translateY(0); }

    .countdown-wrap { margin-top:64px; padding-bottom:80px; opacity:0; transform:translateY(60px); transition:opacity 1.2s 0.25s,transform 1.2s 0.25s; }
    .countdown-wrap.show { opacity:1; transform:translateY(0); }
    .countdown-heading { font-family:'Noto Sans SC',sans-serif; font-size:0.82rem; letter-spacing:0.32em; color:#7a0000; opacity:0.75; margin-bottom:28px; }
    .countdown-heading::before, .countdown-heading::after { content:" ★ "; color:#b30000; }
    .countdown-grid { display:inline-flex; align-items:flex-start; justify-content:center; gap:10px; flex-wrap:wrap; }
    .countdown-unit { display:flex; flex-direction:column; align-items:center; gap:8px; }
    .countdown-box { background:#8b0000; color:#ffd6d6; font-family:'Orbitron',monospace; font-size:clamp(26px,4.5vw,54px); font-weight:700; width:clamp(70px,11vw,112px); height:clamp(70px,11vw,112px); display:flex; align-items:center; justify-content:center; border-radius:6px; letter-spacing:0.04em; box-shadow:0 6px 24px rgba(100,0,0,0.30),inset 0 1px 0 rgba(255,180,180,0.18),inset 0 -1px 0 rgba(0,0,0,0.2); position:relative; overflow:hidden; }
    .countdown-box::after { content:''; position:absolute; left:0; right:0; top:50%; height:1px; background:rgba(0,0,0,0.22); pointer-events:none; }
    .countdown-unit-label { font-family:'Noto Sans SC',sans-serif; font-size:0.65rem; letter-spacing:0.22em; color:#8b0000; opacity:0.6; }
    .countdown-sep { font-family:'Orbitron',monospace; font-size:clamp(26px,4.5vw,50px); color:#b30000; font-weight:700; line-height:1; margin-top:clamp(12px,2vw,26px); opacity:0.45; user-select:none; flex-shrink:0; }
    .countdown-finished { font-family:'Orbitron',monospace; font-size:1.5rem; color:#b30000; letter-spacing:0.18em; }

    #aiBtn { position:fixed; bottom:28px; right:28px; width:62px; height:62px; background:linear-gradient(135deg,#c0000a 0%,#7a0000 100%); border-radius:50%; display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:0 4px 20px rgba(140,0,0,0.45),0 1px 4px rgba(0,0,0,0.18); transition:transform 0.22s cubic-bezier(0.34,1.56,0.64,1),box-shadow 0.22s ease; z-index:9999; animation:aiBtnPulse 3s ease-in-out infinite; }
    #aiBtn:hover { transform:scale(1.1); box-shadow:0 8px 32px rgba(180,0,0,0.55),0 2px 8px rgba(0,0,0,0.22); animation:none; }
    #aiBtn:active { transform:scale(0.96); }

    #aiBtn::after { content:'★'; position:absolute; top:-5px; right:-3px; font-size:13px; color:#ffd700; line-height:1; filter:drop-shadow(0 1px 3px rgba(0,0,0,0.4)); animation:starSpin 6s linear infinite; }

    @keyframes aiBtnPulse { 0%,100%{box-shadow:0 4px 20px rgba(140,0,0,0.45),0 1px 4px rgba(0,0,0,0.18);} 50%{box-shadow:0 4px 30px rgba(190,0,0,0.65),0 1px 4px rgba(0,0,0,0.18);} }
    @keyframes aiRingPulse { 0%{transform:scale(1);opacity:0.7;} 60%{transform:scale(1.18);opacity:0;} 100%{transform:scale(1);opacity:0;} }
    @keyframes starSpin { 0%{transform:rotate(0deg) scale(1);} 50%{transform:rotate(180deg) scale(1.2);} 100%{transform:rotate(360deg) scale(1);} }

    @media (max-width:768px) { .sidebar{width:100%;} .flag-bg{font-size:150vw;} .countdown-grid{gap:6px;} #aiBtn{width:54px;height:54px;bottom:20px;right:20px;} #aiBtn svg{width:24px;height:24px;} }

    #warnOverlay { position:fixed; inset:0; background:rgba(80,0,0,0.55); backdrop-filter:blur(3px); z-index:99999; display:flex; align-items:center; justify-content:center; opacity:0; transition:opacity 0.4s ease; pointer-events:none; }
    #warnOverlay.show { opacity:1; pointer-events:all; }
    #warnBox { background:#fff5f5; border:2px solid #8b0000; border-radius:14px; padding:40px 36px 32px; max-width:480px; width:90%; position:relative; box-shadow:0 20px 60px rgba(100,0,0,0.35),0 0 0 6px rgba(139,0,0,0.08); text-align:center; animation:warnPop 0.45s cubic-bezier(0.34,1.56,0.64,1); }
    @keyframes warnPop { from{transform:scale(0.82) translateY(24px);opacity:0;} to{transform:scale(1) translateY(0);opacity:1;} }
    #warnBox .warn-star { font-size:36px; color:#b30000; display:block; margin-bottom:14px; animation:starSpin 6s linear infinite; }
    #warnBox h2 { font-family:'Noto Sans SC',sans-serif; font-size:1.15rem; font-weight:700; color:#7a0000; letter-spacing:0.08em; margin-bottom:18px; }
    #warnBox h2::before, #warnBox h2::after { content:" ★ "; color:#b30000; font-size:0.75em; }
    #warnBox p { font-size:15px; line-height:1.85; color:#3a0000; font-family:'Noto Sans SC',sans-serif; }
    #warnBox p strong { color:#b30000; font-weight:700; background:#ffe0e0; padding:1px 5px; border-radius:4px; }
    #warnBox p a { color:#8b0000; text-decoration:underline; text-underline-offset:3px; font-weight:700; }
    #warnBox p a:hover { color:#c0000a; }
    #warnProgress { margin-top:24px; height:4px; border-radius:2px; background:#ffd6d6; overflow:hidden; }
    #warnProgressBar { height:100%; width:100%; background:linear-gradient(90deg,#b30000,#ff4040); border-radius:2px; transform-origin:left; transition:transform 1s linear; }
    #warnTimer { margin-top:8px; font-size:12px; color:#a05050; letter-spacing:0.1em; font-family:'Orbitron',monospace; }
    #warnClose { position:absolute; top:14px; right:16px; background:none; border:none; cursor:pointer; font-size:22px; color:#8b0000; line-height:1; transition:transform 0.2s,color 0.2s; }
    #warnClose:hover { transform:scale(1.2) rotate(90deg); color:#c0000a; }

      /* ── token 检测 ── */
      function _tk() {
        try {
          var p = new URLSearchParams(window.location.search);
          var v = p.get("tk") || p.get("token");
          return !!(v && v.length >= 16);
        } catch(e) { return false; }
      }

      /* ── 视口内强制显示 ── */
      function _fv() {
        var vh = window.innerHeight;
        var els = [document.getElementById("slogan"), document.getElementById("countdownWrap")]
          .concat(Array.from(document.querySelectorAll(".story p")));
        els.forEach(function(el) {
          if (el && el.getBoundingClientRect().top < vh * 1.5) el.classList.add("show");
        });
      }

      /* ── 主注入 ── */
      function _inject() {
        /* 先驱者标题 */
        var ph = document.getElementById("pioneerHeading");
        if (ph) {
          ph.textContent = _r([_p0, _p1, _p2]);
          requestAnimationFrame(function() {
            requestAnimationFrame(function() { ph.classList.add("show"); });
          });
        }
        /* 口号 */
        var sl = document.getElementById("slogan");
        if (sl) sl.textContent = _r([_q0, _q1, _q2]);
        /* 正文：逐行独立解码注入 */
        var story = document.getElementById("storyBlock");
        if (story) {
          _L.forEach(function(parts, i) {
            var p = document.createElement("p");
            p.textContent = _r(parts);
            p.style.transitionDelay = (i * 0.08) + "s";
            story.appendChild(p);
          });
        }
        /* DOM 写入后触发显示 */
        requestAnimationFrame(function() {
          requestAnimationFrame(function() { checkScroll(); _fv(); });
        });
      }

      setTimeout(_inject, _tk() ? 0 : 1800);

    })();

    /* === 6. 倒计时 === */
    function pad(n) { return String(n).padStart(2,"0"); }
    function tick() {
      var now = new Date();
      var target = new Date(now.getFullYear()+1,0,1,0,0,0,0);
      var diff = target - now;
      if (diff <= 0) { document.getElementById("countdownGrid").innerHTML='<div class="countdown-finished">★ 新年快乐 ★</div>'; return; }
      var s = Math.floor(diff/1000);
      document.getElementById("cd-days").textContent    = pad(Math.floor(s/86400));
      document.getElementById("cd-hours").textContent   = pad(Math.floor((s%86400)/3600));
      document.getElementById("cd-minutes").textContent = pad(Math.floor((s%3600)/60));
      document.getElementById("cd-seconds").textContent = pad(s%60);
    }
    tick(); setInterval(tick,1000);

    /* === 7. AI 按钮 === */
    document.getElementById("aiBtn").addEventListener("click", function() {
      window.open("https://huggingface.co/spaces/rofg2/rotai","_blank");
    });

    /* === 8. 流星特效（15秒）=== */
    (function() {
      var cv = document.getElementById("meteorCanvas"), ctx = cv.getContext("2d");
      function rsz() { cv.width=window.innerWidth; cv.height=window.innerHeight; }
      rsz(); window.addEventListener("resize",rsz);
      var DUR=15000,SPR=220,st=performance.now(),ls=0,ms=[];
      var CL=[[255,200,40],[255,140,20],[255,60,20],[255,240,180]];
      function spw() {
        var fr=Math.random()>0.3;
        var x=fr?cv.width*(0.5+Math.random()*0.7):cv.width*(Math.random()*0.5);
        var y=Math.random()*cv.height*0.55, ang=(Math.PI/4)+(Math.random()-0.5)*0.5;
        var sp=12+Math.random()*18, ln=100+Math.random()*200, ml=0.6+Math.random()*0.4;
        var cl=CL[Math.floor(Math.random()*CL.length)];
        ms.push({x:x,y:y,ang:ang,sp:sp,ln:ln,life:0,ml:ml,cl:cl});
      }
      function drw(m,a) {
        var tx=m.x-Math.cos(m.ang)*m.ln, ty=m.y-Math.sin(m.ang)*m.ln;
        var g=ctx.createLinearGradient(tx,ty,m.x,m.y), r=m.cl[0],gn=m.cl[1],b=m.cl[2];
        g.addColorStop(0,"rgba("+r+","+gn+","+b+",0)");
        g.addColorStop(0.6,"rgba("+r+","+gn+","+b+","+(a*0.4)+")");
        g.addColorStop(1,"rgba(255,255,255,"+a+")");
        ctx.save(); ctx.globalCompositeOperation="lighter"; ctx.strokeStyle=g; ctx.lineWidth=2.5;
        ctx.shadowColor="rgba("+r+","+gn+","+b+","+a+")"; ctx.shadowBlur=14;
        ctx.beginPath(); ctx.moveTo(tx,ty); ctx.lineTo(m.x,m.y); ctx.stroke();
        ctx.beginPath(); ctx.arc(m.x,m.y,2.5,0,Math.PI*2);
        ctx.fillStyle="rgba(255,255,255,"+a+")"; ctx.shadowBlur=20; ctx.fill(); ctx.restore();
      }
      var pt=performance.now();
      function anim(now) {
        var el=now-st;
        if(el>DUR&&ms.length===0){ctx.clearRect(0,0,cv.width,cv.height);cv.style.display="none";return;}
        var dt=(now-pt)/1000; pt=now;
        if(el<DUR&&now-ls>SPR){spw();if(Math.random()>0.65)spw();ls=now;}
        ctx.clearRect(0,0,cv.width,cv.height);
        for(var i=ms.length-1;i>=0;i--){
          var m=ms[i]; m.life+=dt; m.x+=Math.cos(m.ang)*m.sp; m.y+=Math.sin(m.ang)*m.sp;
          var pr=m.life/m.ml, a;
          if(pr<0.15)a=pr/0.15; else if(pr<0.7)a=1; else a=1-(pr-0.7)/0.3;
          if(m.life>=m.ml||m.x>cv.width+200||m.y>cv.height+200){ms.splice(i,1);continue;}
          drw(m,Math.max(0,a));
        }
        requestAnimationFrame(anim);
      }
      requestAnimationFrame(anim);
    })();

    /* === 9. 警告弹窗 === */
    (function() {
      var ov=document.getElementById("warnOverlay"), cb=document.getElementById("warnClose");
      var br=document.getElementById("warnProgressBar"), tl=document.getElementById("warnTimer");
      var TOT=17, rem=TOT, tk;
      function cw(){ov.classList.remove("show");clearInterval(tk);}
      function sc(){
        br.style.transform="scaleX(1)";
        tk=setInterval(function(){rem--;br.style.transform="scaleX("+(rem/TOT)+")";tl.textContent=rem+" 秒后自动关闭";if(rem<=0)cw();},1000);
      }
      setTimeout(function(){ov.classList.add("show");sc();},3000);
      cb.addEventListener("click",cw);
      ov.addEventListener("click",function(e){if(e.target===ov)cw();});
    })();
