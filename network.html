<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">

<title>二次元导航</title>

<style>
:root{
  --red:#b30000;
  --darkred:#7a0000;
  --gold:#ffd700;
  --bg:#ffeaea;
}

body{
  margin:0;
  background:var(--bg);
  font-family:'Noto Sans SC',sans-serif;
}

/* 背景星 */
.bg-star{
  position:fixed;
  top:50%;
  left:50%;
  transform:translate(-50%,-50%);
  font-size:120vw;
  color:var(--gold);
  opacity:0.06;
  z-index:-1;
}

/* 主容器 */
.container{
  max-width:800px;
  margin:auto;
  padding:80px 20px;
}

/* 标题 */
.title{
  text-align:center;
  font-size:32px;
  color:var(--darkred);
  margin-bottom:30px;
  letter-spacing:3px;
}

/* 卡片 */
.card{
  background:white;
  border-radius:12px;
  padding:25px;
  box-shadow:0 10px 30px rgba(120,0,0,0.15);
  line-height:1.8;
  word-break:break-all;
}

/* 按钮 */
.copy-btn{
  display:block;
  margin:25px auto 0;
  padding:12px 30px;
  background:linear-gradient(135deg,var(--red),var(--darkred));
  color:white;
  border:none;
  border-radius:8px;
  cursor:pointer;
  font-size:14px;
  letter-spacing:2px;
  transition:.2s;
}

.copy-btn:hover{
  transform:translateY(-2px);
  filter:brightness(1.1);
}

/* 提示 */
.toast{
  position:fixed;
  bottom:40px;
  left:50%;
  transform:translateX(-50%);
  background:rgba(0,0,0,0.8);
  color:#fff;
  padding:10px 20px;
  border-radius:6px;
  font-size:13px;
  opacity:0;
  transition:.3s;
}

.toast.show{
  opacity:1;
}
</style>
</head>

<body>

<div class="bg-star">★</div>

<div class="container">
  <div class="title">二次元导航站点</div>

  <div class="card" id="content">

  <button class="copy-btn" onclick="copyText()">一键复制全部内容</button>
</div>

<div class="toast" id="toast">已复制 ✔</div>

<script>
function copyText(){
  const text = document.getElementById("content").innerText;

  if(navigator.clipboard){
    navigator.clipboard.writeText(text).then(showToast);
  }else{
    // fallback
    const textarea = document.createElement("textarea");
    textarea.value = text;
    document.body.appendChild(textarea);
    textarea.select();
    document.execCommand("copy");
    textarea.remove();
    showToast();
  }
}

function showToast(){
  const t = document.getElementById("toast");
  t.classList.add("show");
  setTimeout(()=>t.classList.remove("show"),1500);
}
</script>

</body>
