<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#000000">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新文章 · 赤星</title>
  <meta name="description" content="赤星最新文章列表">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:      #b30000;
      --darkred:  #7a0000;
      --lightred: #ffd6d6;
      --gold:     #ffd700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--lightred);
      font-family: 'Noto Sans SC', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    #meteorCanvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
    }

    .flag-bg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120vw; color: #ffd700; opacity: 0.08;
      z-index: -1; pointer-events: none; user-select: none; line-height: 1;
    }

    .menu-btn {
      position: fixed; top: 25px; right: 25px;
      width: 55px; height: 55px; background: var(--red); border-radius: 10px;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; gap: 6px; cursor: pointer;
      box-shadow: 0 0 15px rgba(180,0,0,0.5); z-index: 1000;
      transition: 0.25s;
    }
    .menu-btn span { width: 26px; height: 3px; background: white; transition: 0.3s; }
    .menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(6px,6px); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }
    .menu-btn::before {
      content: "★"; color: var(--gold); position: absolute;
      top: -12px; right: -12px; font-size: 20px;
    }

    .sidebar {
      position: fixed; top: 0; right: 0; width: 350px; height: 100vh;
      background: rgba(255,220,220,0.96); padding: 100px 40px;
      transform: translateX(100%); transition: 0.35s;
      border-left: 2px solid #900; z-index: 999;
    }
    .sidebar.active { transform: translateX(0); }
    .sidebar a {
      display: block; margin-bottom: 20px; padding: 14px;
      background: white; border-radius: 8px;
      text-decoration: none; color: #222; transition: 0.2s; font-size: 15px;
    }
    .sidebar a:hover { background: #ffcccc; }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 160px;
    }

    .page-header {
      text-align: center;
      margin-bottom: 60px;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
                  transform 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .page-header.show { opacity: 1; transform: translateY(0); }

    .page-header .star-deco {
      font-size: 26px; color: var(--gold); letter-spacing: 12px;
      display: block; margin-bottom: 18px;
      animation: starGlow 3s ease-in-out infinite;
    }
    @keyframes starGlow {
      0%, 100% { text-shadow: 0 0 8px rgba(255,215,0,0.4); }
      50%       { text-shadow: 0 0 22px rgba(255,215,0,0.8); }
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 58px);
      color: #8b0000;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--darkred);
      letter-spacing: 0.28em;
      opacity: 0.7;
    }
    .page-subtitle::before,
    .page-subtitle::after { content: " ★ "; color: var(--red); }

    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 32px auto 0; max-width: 320px;
    }
    .divider::before { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #b30000aa); }
    .divider::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #b30000aa, transparent); }
    .divider-star { color: var(--gold); font-size: 18px; }

    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.55);
      border-radius: 8px;
      border: 1px solid rgba(179,0,0,0.12);
      font-size: 13px;
      color: var(--darkred);
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.6s 0.2s;
    }
    .stats-bar.show { opacity: 1; }
    .stats-bar .total { font-weight: 700; color: var(--red); }
    .stats-bar .page-info { opacity: 0.7; }

    #blog-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      margin-bottom: 48px;
      transition: opacity 0.22s ease;
    }
    #blog-cards.fading { opacity: 0; }

    .loading-msg, .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--darkred);
      font-size: 15px;
      letter-spacing: 0.2em;
      padding: 60px 0;
      opacity: 0.7;
    }
    .error-msg { color: #8b0000; opacity: 0.6; }
    .loading-spinner { display: inline-block; animation: spin 1.2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .blog-card {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(179,0,0,0.12);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(120,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      transition: all 0.28s cubic-bezier(0.34,1.56,0.64,1);
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }

    .blog-card.expanded {
      grid-column: 1 / -1;
      transform: none !important;
      box-shadow: 0 16px 64px rgba(120,0,0,0.22);
    }

    .blog-card:hover:not(.expanded) {
      transform: translateY(-8px) scale(1.012);
      box-shadow: 0 20px 52px rgba(120,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
    }

    .card-top-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--darkred), var(--red), var(--gold));
    }

    .card-body {
      padding: 22px 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-meta { display: flex; align-items: center; gap: 8px; }

    .card-index {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: var(--gold);
      background: var(--darkred);
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .card-date { font-size: 12px; color: #999; letter-spacing: 0.1em; }

    .card-title { font-size: 17px; font-weight: 700; color: #1a1a1a; line-height: 1.5; }

    .card-summary {
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .card-content {
      display: none;
      padding: 0 24px 24px;
      font-size: 15px;
      line-height: 1.78;
      color: #222;
    }
    .card-content.show {
      display: block;
    }
    .card-content :is(h1,h2,h3,h4,h5,h6) {
      color: var(--darkred);
      margin: 1.4em 0 0.6em;
    }
    .card-content p { margin: 1.1em 0; }
    .card-content img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 1.2em auto;
      display: block;
      box-shadow: 0 4px 16px rgba(0,0,0,0.12);
    }
    .card-content pre {
      background: #f8f0f0;
      padding: 14px 18px;
      border-radius: 8px;
      overflow-x: auto;
      font-size: 13.5px;
    }

    .card-footer {
      padding: 0 24px 20px;
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .card-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, var(--red) 0%, var(--darkred) 100%);
      padding: 9px 18px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      transition: all 0.2s;
      box-shadow: 0 3px 12px rgba(120,0,0,0.3);
      cursor: pointer;
      border: none;
    }
    .card-btn:hover { filter: brightness(1.15); transform: translateX(3px); }
    .card-btn::after { content: "→"; font-size: 14px; }

    .card-btn.close {
      background: linear-gradient(135deg, #555 0%, #333 100%);
    }
    .card-btn.close::after { content: "↑"; }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s 0.25s, transform 0.5s 0.25s;
    }
    .pagination.show { opacity: 1; transform: translateY(0); }

    .pg-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border: 1.5px solid var(--red);
      background: rgba(255,255,255,0.55);
      color: var(--red);
      border-radius: 7px;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: all 0.2s;
    }
    .pg-btn:hover:not(:disabled) {
      background: var(--red); color: white; transform: translateY(-2px);
    }
    .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pg-btn.prev::before { content: "← "; }
    .pg-btn.next::after  { content: " →"; }

    .pg-numbers {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; justify-content: center;
    }

    .pg-num {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      border: 1.5px solid rgba(179,0,0,0.3);
      background: rgba(255,255,255,0.55);
      color: var(--darkred);
      font-size: 13px;
      font-family: 'Orbitron', monospace;
      cursor: pointer;
      transition: all 0.18s;
    }
    .pg-num:hover { background: rgba(179,0,0,0.1); transform: translateY(-2px); }
    .pg-num.active {
      background: var(--darkred); color: var(--gold);
      border-color: var(--darkred); font-weight: 700;
    }

    .pg-ellipsis {
      color: var(--darkred); opacity: 0.5;
      font-size: 14px; letter-spacing: 2px; padding: 0 4px;
    }

    .more-wrap {
      text-align: center; margin: 32px 0 80px;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s 0.4s, transform 0.8s 0.4s;
    }
    .more-wrap.show { opacity: 1; transform: translateY(0); }

    .more-btn {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--red);
      border: 1.5px solid var(--red); padding: 12px 32px;
      border-radius: 8px; font-size: 15px; letter-spacing: 0.15em;
      transition: all 0.22s;
      background: rgba(255,255,255,0.5);
    }
    .more-btn:hover { background: var(--red); color: white; }

    #aiBtn {
      position: fixed; bottom: 28px; right: 28px;
      width: 62px; height: 62px;
      background: linear-gradient(135deg, #c0000a 0%, #7a0000 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(140,0,0,0.45);
      transition: all 0.22s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 9999;
      animation: aiBtnPulse 3s ease-in-out infinite;
    }
    #aiBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 32px rgba(180,0,0,0.55);
      animation: none;
    }

    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .flag-bg  { font-size: 150vw; }
      #blog-cards { grid-template-columns: 1fr; }
      #aiBtn { width: 54px; height: 54px; bottom: 20px; right: 20px; }
      .card-content { font-size: 14.5px; }
    }
  </style>
</head>
<body>

  <canvas id="meteorCanvas"></canvas>
  <div class="flag-bg">★</div>

  <div class="menu-btn" id="menuBtn">
    <span></span><span></span><span></span>
  </div>

  <div class="sidebar" id="sidebar">
    <a href="jieshao.html">关于我们</a>
    <a href="blog.html">文章查看</a>
    <a href="network.html">网安知识</a>
    <a href="download.html">文件下载</a>
    <a href="wenw/about.html">公示板块</a>
  </div>

  <div class="container">

    <header class="page-header" id="pageHeader">
      <span class="star-deco">★ ★ ★</span>
      <h1 class="page-title">最新文章</h1>
      <p class="page-subtitle">来自赤星的理论与记录</p>
      <div class="divider"><span class="divider-star">★</span></div>
    </header>

    <div class="stats-bar" id="statsBar">
      <span>共 <span class="total" id="totalCount">—</span> 篇文章</span>
      <span class="page-info" id="pageInfo">第 — 页 / 共 — 页</span>
    </div>

    <div id="blog-cards">
      <div class="loading-msg">
        <span class="loading-spinner">⟳</span> 文章加载中
      </div>
    </div>

    <div class="pagination" id="pagination"></div>

    <div class="more-wrap" id="moreWrap">
      <a href="https://paper.wf/meteor" class="more-btn" target="_blank">
        前往博客查看全部
      </a>
    </div>

  </div>

  <div id="aiBtn" title="打开 AI 对话">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3C7.03 3 3 6.69 3 11.2c0 2.4 1.1 4.57 2.88 6.1L5 21l3.9-1.72A10.1 10.1 0 0012 19.4c4.97 0 9-3.69 9-8.2S16.97 3 12 3z"/>
      <circle cx="8.5"  cy="11.2" r="1" fill="white"/>
      <circle cx="12"   cy="11.2" r="1" fill="white"/>
      <circle cx="15.5" cy="11.2" r="1" fill="white"/>
    </svg>
  </div>

  <script>
    // ==================== 菜单 ====================
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    menuBtn.onclick = () => {
      menuBtn.classList.toggle("active");
      sidebar.classList.toggle("active");
    };

    // ==================== 页头淡入 ====================
    setTimeout(() => {
      document.getElementById("pageHeader").classList.add("show");
    }, 300);

    // ==================== 分页与数据 ====================
    const PAGE_SIZE = 6;
    let allArticles = [];
    let currentPage = 1;

    // ==================== 缓存工具 ====================
    const CACHE_PREFIX = "meteor_article_";
    const CACHE_EXPIRE_HOURS = 24;

    function getCachedContent(link) {
      const key = CACHE_PREFIX + btoa(link);
      const data = localStorage.getItem(key);
      if (!data) return null;
      try {
        const obj = JSON.parse(data);
        if (Date.now() - obj.timestamp > CACHE_EXPIRE_HOURS * 3600 * 1000) {
          localStorage.removeItem(key);
          return null;
        }
        return obj.content;
      } catch {
        localStorage.removeItem(key);
        return null;
      }
    }

    function setCachedContent(link, content) {
      const key = CACHE_PREFIX + btoa(link);
      localStorage.setItem(key, JSON.stringify({
        timestamp: Date.now(),
        content
      }));
    }

    // ==================== 获取文章正文 ====================
    async function fetchArticleContent(url) {
      try {
        const proxyUrl = `https://api.allorigins.win/raw?url=${encodeURIComponent(url)}`;
        const res = await fetch(proxyUrl);
        if (!res.ok) throw new Error("网络响应失败");
        const text = await res.text();
        const parser = new DOMParser();
        const doc = parser.parseFromString(text, "text/html");

        // 尝试提取正文（WriteFreely 常见结构）
        let contentEl = doc.querySelector("article") ||
                        doc.querySelector(".entry-content") ||
                        doc.querySelector(".content") ||
                        doc.querySelector("main");

        if (!contentEl) {
          contentEl = doc.body;
        }

        // 清理不必要的元素
        const toRemove = contentEl.querySelectorAll("script, style, noscript, iframe, .footer, nav, header, .meta");
        toRemove.forEach(el => el.remove());

        return contentEl.innerHTML.trim() || "<p>无法提取正文内容</p>";
      } catch (err) {
        console.error(err);
        return `<p style="color:#c00">加载失败：${err.message}</p>`;
      }
    }

    // ==================== 渲染单页 ====================
    function renderPage(page) {
      const totalPages = Math.ceil(allArticles.length / PAGE_SIZE);
      page = Math.max(1, Math.min(page, totalPages));
      currentPage = page;

      const cardsEl = document.getElementById("blog-cards");
      cardsEl.classList.add("fading");

      setTimeout(() => {
        const start = (page - 1) * PAGE_SIZE;
        const slice = allArticles.slice(start, start + PAGE_SIZE);
        let html = "";

        slice.forEach((a, i) => {
          const idx = start + i + 1;
          const delay = (i * 0.07).toFixed(2) + "s";
          html += `
            <div class="blog-card" data-link="${a.link}" style="animation-delay:${delay}">
              <div class="card-top-bar"></div>
              <div class="card-body">
                <div class="card-meta">
                  <span class="card-index">NO.${idx}</span>
                  <span class="card-date">${a.formattedDate}</span>
                </div>
                <div class="card-title">${a.title}</div>
                ${a.summary ? `<div class="card-summary">${a.summary}</div>` : ""}
              </div>
              <div class="card-footer">
                <button class="card-btn toggle-btn" data-action="expand">阅读全文</button>
              </div>
              <div class="card-content" id="content-${idx}"></div>
            </div>`;
        });

        cardsEl.innerHTML = html;
        cardsEl.classList.remove("fading");

        document.getElementById("pageInfo").textContent =
          `第 ${page} 页 / 共 ${totalPages} 页`;

        renderPagination(page, totalPages);
        document.getElementById("moreWrap").classList.add("show");

        if (page !== 1) {
          document.getElementById("statsBar").scrollIntoView({ behavior: "smooth", block: "start" });
        }

        // 绑定展开/关闭事件
        document.querySelectorAll(".toggle-btn").forEach(btn => {
          btn.onclick = async () => {
            const card = btn.closest(".blog-card");
            const link = card.dataset.link;
            const contentEl = card.querySelector(".card-content");
            const isExpanded = card.classList.contains("expanded");

            if (isExpanded) {
              // 关闭
              card.classList.remove("expanded");
              contentEl.classList.remove("show");
              btn.textContent = "阅读全文";
              btn.classList.remove("close");
              btn.innerHTML = '阅读全文 <span style="font-size:14px">→</span>';
            } else {
              // 展开
              card.classList.add("expanded");
              btn.disabled = true;
              btn.innerHTML = '加载中...';

              let html = getCachedContent(link);

              if (!html) {
                html = await fetchArticleContent(link);
                if (html && !html.includes("加载失败")) {
                  setCachedContent(link, html);
                }
              }

              contentEl.innerHTML = html;
              contentEl.classList.add("show");
              btn.disabled = false;
              btn.classList.add("close");
              btn.innerHTML = '收起 ↑';

              // 滚动到卡片顶部
              card.scrollIntoView({ behavior: "smooth", block: "start" });
            }
          };
        });
      }, 220);
    }

    // ==================== 分页控件 ====================
    function renderPagination(cur, total) {
      const el = document.getElementById("pagination");
      if (total <= 1) {
        el.innerHTML = "";
        el.classList.remove("show");
        return;
      }

      let pages = [];
      if (total <= 7) {
        for (let i = 1; i <= total; i++) pages.push(i);
      } else {
        const left  = Math.max(2, cur - 1);
        const right = Math.min(total - 1, cur + 1);
        pages.push(1);
        if (left > 2) pages.push("…");
        for (let i = left; i <= right; i++) pages.push(i);
        if (right < total - 1) pages.push("…");
        pages.push(total);
      }

      let html = `<button class="pg-btn prev" ${cur===1?"disabled":""} onclick="renderPage(${cur-1})">上一页</button>`;
      html += '<div class="pg-numbers">';
      pages.forEach(p => {
        if (p === "…") {
          html += `<span class="pg-ellipsis">…</span>`;
        } else {
          html += `<div class="pg-num ${p===cur?"active":""}" onclick="renderPage(${p})">${p}</div>`;
        }
      });
      html += '</div>';
      html += `<button class="pg-btn next" ${cur===total?"disabled":""} onclick="renderPage(${cur+1})">下一页</button>`;

      el.innerHTML = html;
      el.classList.add("show");
    }

    // ==================== RSS 加载 ====================
    fetch("https://paper.wf/meteor/feed/")
      .then(r => r.text())
      .then(str => new DOMParser().parseFromString(str, "text/xml"))
      .then(data => {
        data.querySelectorAll("item").forEach(el => {
          const title = el.querySelector("title")?.textContent || "";
          const link  = el.querySelector("link")?.textContent || "";
          const date  = new Date(el.querySelector("pubDate")?.textContent || "");

          const formattedDate = date && !isNaN(date)
            ? date.getFullYear() + "-" + String(date.getMonth()+1).padStart(2,"0") + "-" + String(date.getDate()).padStart(2,"0")
            : "未知日期";

          let summary = "";
          const desc = el.querySelector("description")?.textContent || "";
          if (desc) {
            summary = desc
              .replace(/<[^>]+>/g, "")
              .replace(/\s+/g, " ")
              .trim()
              .slice(0, 120);
            if (summary.length === 120) summary += "…";
          }

          if (title && link) {
            allArticles.push({ title, link, formattedDate, summary });
          }
        });

        if (allArticles.length === 0) {
          document.getElementById("blog-cards").innerHTML = '<div class="error-msg">暂无文章</div>';
          return;
        }

        document.getElementById("totalCount").textContent = allArticles.length;
        document.getElementById("statsBar").classList.add("show");
        renderPage(1);
      })
      .catch(err => {
        console.error(err);
        document.getElementById("blog-cards").innerHTML =
          '<div class="error-msg">★ 博客加载失败，请稍后重试 ★</div>';
      });

    // ==================== AI 按钮 ====================
    document.getElementById("aiBtn").onclick = () => {
      window.open("https://huggingface.co/spaces/rofg2/rotai", "_blank");
    };

    // ==================== 流星特效（保持原样） ====================
    (function () {
      const canvas = document.getElementById("meteorCanvas");
      const ctx = canvas.getContext("2d");

      function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      const DURATION = 15000;
      const SPAWN_RATE = 220;
      const startTime = performance.now();
      let lastSpawn = 0;
      const meteors = [];
      const COLORS = [[255,200,40],[255,140,20],[255,60,20],[255,240,180]];

      function spawnMeteor() {
        const fromRight = Math.random() > 0.3;
        meteors.push({
          x: fromRight ? canvas.width * (0.5 + Math.random()*0.7) : canvas.width * Math.random()*0.5,
          y: Math.random() * canvas.height * 0.55,
          angle: Math.PI/4 + (Math.random()-0.5)*0.5,
          speed: 12 + Math.random()*18,
          length: 100 + Math.random()*200,
          life: 0,
          maxLife: 0.6 + Math.random()*0.4,
          col: COLORS[Math.floor(Math.random()*COLORS.length)]
        });
      }

      function drawMeteor(m, alpha) {
        const tailX = m.x - Math.cos(m.angle) * m.length;
        const tailY = m.y - Math.sin(m.angle) * m.length;
        const grad = ctx.createLinearGradient(tailX, tailY, m.x, m.y);
        const [r,g,b] = m.col;
        grad.addColorStop(0,   `rgba(${r},${g},${b},0)`);
        grad.addColorStop(0.6, `rgba(${r},${g},${b},${alpha*0.4})`);
        grad.addColorStop(1,   `rgba(255,255,255,${alpha})`);

        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = grad; ctx.lineWidth = 2.5;
        ctx.shadowColor = `rgba(${r},${g},${b},${alpha})`; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.moveTo(tailX, tailY); ctx.lineTo(m.x, m.y); ctx.stroke();
        ctx.beginPath(); ctx.arc(m.x, m.y, 2.5, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.shadowBlur = 20; ctx.fill();
        ctx.restore();
      }

      let prevTime = performance.now();
      function animate(now) {
        const elapsed = now - startTime;
        if (elapsed > DURATION && meteors.length === 0) {
          ctx.clearRect(0,0,canvas.width,canvas.height);
          canvas.style.display = "none";
          return;
        }

        const dt = (now - prevTime)/1000; prevTime = now;

        if (elapsed < DURATION && now - lastSpawn > SPAWN_RATE) {
          spawnMeteor();
          if (Math.random() > 0.65) spawnMeteor();
          lastSpawn = now;
        }

        ctx.clearRect(0,0,canvas.width,canvas.height);

        for (let i = meteors.length-1; i >= 0; i--) {
          const m = meteors[i];
          m.life += dt;
          m.x += Math.cos(m.angle) * m.speed;
          m.y += Math.sin(m.angle) * m.speed;

          const p = m.life / m.maxLife;
          const alpha = p < 0.15 ? p/0.15 : p < 0.7 ? 1 : 1 - (p-0.7)/0.3;

          if (m.life >= m.maxLife || m.x > canvas.width+200 || m.y > canvas.height+200) {
            meteors.splice(i,1);
            continue;
          }
          drawMeteor(m, Math.max(0, alpha));
        }

        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    })();
  </script>
</body>
