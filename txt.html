<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>最新文章 · 赤星</title>
  <meta name="description" content="赤星最新文章列表">
  <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Noto+Sans+SC:wght@300;400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --red:      #b30000;
      --darkred:  #7a0000;
      --lightred: #ffd6d6;
      --gold:     #ffd700;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: var(--lightred);
      font-family: 'Noto Sans SC', sans-serif;
      overflow-x: hidden;
      min-height: 100vh;
    }

    /* ===== 流星画布 ===== */
    #meteorCanvas {
      position: fixed; top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none; z-index: 9998;
    }

    /* ===== 淡色红星背景 ===== */
    .flag-bg {
      position: fixed; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      font-size: 120vw; color: #ffd700; opacity: 0.08;
      z-index: -1; pointer-events: none; user-select: none; line-height: 1;
    }

    /* ===== 汉堡按钮 ===== */
    .menu-btn {
      position: fixed; top: 25px; right: 25px;
      width: 55px; height: 55px; background: var(--red); border-radius: 10px;
      display: flex; flex-direction: column; justify-content: center;
      align-items: center; gap: 6px; cursor: pointer;
      box-shadow: 0 0 15px rgba(180,0,0,0.5); z-index: 1000;
      transition: 0.25s;
    }
    .menu-btn span { width: 26px; height: 3px; background: white; transition: 0.3s; }
    .menu-btn.active span:nth-child(1) { transform: rotate(45deg) translate(6px,6px); }
    .menu-btn.active span:nth-child(2) { opacity: 0; }
    .menu-btn.active span:nth-child(3) { transform: rotate(-45deg) translate(6px,-6px); }
    .menu-btn::before {
      content: "★"; color: var(--gold); position: absolute;
      top: -12px; right: -12px; font-size: 20px;
    }

    /* ===== 侧边栏 ===== */
    .sidebar {
      position: fixed; top: 0; right: 0; width: 350px; height: 100vh;
      background: rgba(255,220,220,0.96); padding: 100px 40px;
      transform: translateX(100%); transition: 0.35s;
      border-left: 2px solid #900; z-index: 999;
    }
    .sidebar.active { transform: translateX(0); }
    .sidebar a {
      display: block; margin-bottom: 20px; padding: 14px;
      background: white; border-radius: 8px;
      text-decoration: none; color: #222; transition: 0.2s; font-size: 15px;
    }
    .sidebar a:hover { background: #ffcccc; }

    /* ===== 主容器 ===== */
    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 80px 24px 100px;
    }

    /* ===== 页头 ===== */
    .page-header {
      text-align: center;
      margin-bottom: 60px;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 0.9s cubic-bezier(0.22,1,0.36,1),
                  transform 0.9s cubic-bezier(0.22,1,0.36,1);
    }
    .page-header.show { opacity: 1; transform: translateY(0); }

    .page-header .star-deco {
      font-size: 26px; color: var(--gold); letter-spacing: 12px;
      display: block; margin-bottom: 18px;
      animation: starGlow 3s ease-in-out infinite;
    }
    @keyframes starGlow {
      0%, 100% { text-shadow: 0 0 8px rgba(255,215,0,0.4); }
      50%       { text-shadow: 0 0 22px rgba(255,215,0,0.8); }
    }

    .page-title {
      font-family: 'Orbitron', monospace;
      font-size: clamp(28px, 6vw, 58px);
      color: #8b0000;
      letter-spacing: 0.08em;
      margin-bottom: 14px;
    }

    .page-subtitle {
      font-size: 14px;
      color: var(--darkred);
      letter-spacing: 0.28em;
      opacity: 0.7;
    }
    .page-subtitle::before,
    .page-subtitle::after { content: " ★ "; color: var(--red); }

    .divider {
      display: flex; align-items: center; gap: 16px;
      margin: 32px auto 0; max-width: 320px;
    }
    .divider::before { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, transparent, #b30000aa); }
    .divider::after  { content: ''; flex: 1; height: 1px; background: linear-gradient(90deg, #b30000aa, transparent); }
    .divider-star { color: var(--gold); font-size: 18px; }

    /* ===== 统计条 ===== */
    .stats-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 24px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.55);
      border-radius: 8px;
      border: 1px solid rgba(179,0,0,0.12);
      font-size: 13px;
      color: var(--darkred);
      letter-spacing: 0.1em;
      opacity: 0;
      transition: opacity 0.6s 0.2s;
    }
    .stats-bar.show { opacity: 1; }
    .stats-bar .total { font-weight: 700; color: var(--red); }
    .stats-bar .page-info { opacity: 0.7; }

    /* ===== 博客卡片网格 ===== */
    #blog-cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 28px;
      margin-bottom: 48px;
      transition: opacity 0.22s ease;
    }
    #blog-cards.fading { opacity: 0; }

    .loading-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: var(--darkred);
      font-size: 15px;
      letter-spacing: 0.2em;
      padding: 60px 0;
      opacity: 0.7;
    }
    .loading-spinner { display: inline-block; animation: spin 1.2s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .error-msg {
      grid-column: 1 / -1;
      text-align: center;
      color: #8b0000;
      font-size: 14px;
      letter-spacing: 0.15em;
      padding: 40px 0;
      opacity: 0.6;
    }

    /* ===== 单张博客卡片 ===== */
    .blog-card {
      background: rgba(255,255,255,0.82);
      border: 1px solid rgba(179,0,0,0.12);
      border-radius: 14px;
      box-shadow: 0 8px 32px rgba(120,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
      transition: transform 0.28s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.28s ease;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px);
      animation: cardIn 0.5s cubic-bezier(0.22,1,0.36,1) forwards;
      cursor: pointer;
    }
    @keyframes cardIn { to { opacity: 1; transform: translateY(0); } }
    .blog-card:hover {
      transform: translateY(-8px) scale(1.012);
      box-shadow: 0 20px 52px rgba(120,0,0,0.18), 0 4px 16px rgba(0,0,0,0.10);
    }

    /* 展开状态 */
    .blog-card.expanded {
      grid-column: 1 / -1;
      transform: none;
    }
    .blog-card.expanded:hover {
      transform: translateY(-4px);
    }

    .card-top-bar {
      height: 4px;
      background: linear-gradient(90deg, var(--darkred), var(--red), var(--gold));
    }

    .card-body {
      padding: 22px 24px 20px;
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .card-meta { display: flex; align-items: center; gap: 8px; }

    .card-index {
      font-family: 'Orbitron', monospace;
      font-size: 10px;
      color: var(--gold);
      background: var(--darkred);
      padding: 2px 7px;
      border-radius: 3px;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }

    .card-date { font-size: 12px; color: #999; letter-spacing: 0.1em; }

    .card-title { font-size: 17px; font-weight: 700; color: #1a1a1a; line-height: 1.5; }

    .card-summary {
      font-size: 13px;
      color: #555;
      line-height: 1.8;
      flex: 1;
      display: -webkit-box;
      -webkit-line-clamp: 4;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* 展开时隐藏摘要 */
    .blog-card.expanded .card-summary {
      display: none;
    }

    /* ===== 博客内容区域 ===== */
    .card-content {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s cubic-bezier(0.4, 0, 0.2, 1);
      padding: 0 24px;
    }

    .blog-card.expanded .card-content {
      max-height: 5000px;
      padding: 0 24px 20px;
    }

    .content-inner {
      padding: 20px 0;
      border-top: 1px solid rgba(179,0,0,0.15);
      font-size: 14px;
      line-height: 1.9;
      color: #333;
    }

    .content-inner h1, .content-inner h2, .content-inner h3 {
      color: var(--darkred);
      margin: 24px 0 12px;
      font-weight: 700;
    }

    .content-inner h1 { font-size: 22px; }
    .content-inner h2 { font-size: 19px; }
    .content-inner h3 { font-size: 16px; }

    .content-inner p {
      margin: 12px 0;
    }

    .content-inner ul, .content-inner ol {
      margin: 12px 0;
      padding-left: 24px;
    }

    .content-inner li {
      margin: 6px 0;
    }

    .content-inner code {
      background: rgba(179,0,0,0.08);
      padding: 2px 6px;
      border-radius: 3px;
      font-family: 'Courier New', monospace;
      font-size: 13px;
    }

    .content-inner pre {
      background: rgba(0,0,0,0.05);
      padding: 16px;
      border-radius: 6px;
      overflow-x: auto;
      margin: 16px 0;
    }

    .content-inner pre code {
      background: none;
      padding: 0;
    }

    .content-inner blockquote {
      border-left: 3px solid var(--red);
      padding-left: 16px;
      margin: 16px 0;
      color: #666;
      font-style: italic;
    }

    .content-inner img {
      max-width: 100%;
      height: auto;
      border-radius: 8px;
      margin: 16px 0;
    }

    .content-loading {
      text-align: center;
      padding: 40px 0;
      color: var(--darkred);
      font-size: 14px;
    }

    .content-error {
      text-align: center;
      padding: 40px 0;
      color: #8b0000;
      font-size: 14px;
    }

    .card-footer { padding: 0 24px 20px; }

    .card-link {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      color: white;
      background: linear-gradient(135deg, var(--red) 0%, var(--darkred) 100%);
      padding: 9px 18px;
      border-radius: 7px;
      font-size: 13px;
      font-weight: 500;
      letter-spacing: 0.08em;
      transition: filter 0.2s, transform 0.2s;
      box-shadow: 0 3px 12px rgba(120,0,0,0.3);
    }
    .card-link::after { content: "→"; font-size: 14px; }
    .card-link:hover  { filter: brightness(1.15); transform: translateX(3px); }

    /* 展开指示器 */
    .expand-indicator {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      color: var(--red);
      margin-left: auto;
      padding: 6px 12px;
      border: 1px solid var(--red);
      border-radius: 5px;
      background: rgba(255,255,255,0.5);
      transition: all 0.2s;
    }

    .expand-indicator::after {
      content: "▼";
      font-size: 10px;
      transition: transform 0.3s;
    }

    .blog-card.expanded .expand-indicator::after {
      transform: rotate(180deg);
    }

    .blog-card.expanded .expand-indicator {
      background: var(--red);
      color: white;
    }

    /* ===== 分页控件 ===== */
    .pagination {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 48px;
      opacity: 0;
      transform: translateY(16px);
      transition: opacity 0.5s 0.25s, transform 0.5s 0.25s;
    }
    .pagination.show { opacity: 1; transform: translateY(0); }

    .pg-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 9px 20px;
      border: 1.5px solid var(--red);
      background: rgba(255,255,255,0.55);
      color: var(--red);
      border-radius: 7px;
      font-size: 13px;
      letter-spacing: 0.1em;
      cursor: pointer;
      transition: background 0.2s, color 0.2s, transform 0.18s;
      font-family: 'Noto Sans SC', sans-serif;
    }
    .pg-btn:hover:not(:disabled) {
      background: var(--red); color: white; transform: translateY(-2px);
    }
    .pg-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    .pg-btn.prev::before { content: "← "; }
    .pg-btn.next::after  { content: " →"; }

    .pg-numbers {
      display: flex; align-items: center; gap: 6px;
      flex-wrap: wrap; justify-content: center;
    }

    .pg-num {
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 6px;
      border: 1.5px solid rgba(179,0,0,0.3);
      background: rgba(255,255,255,0.55);
      color: var(--darkred);
      font-size: 13px;
      font-family: 'Orbitron', monospace;
      cursor: pointer;
      transition: background 0.18s, color 0.18s, transform 0.18s;
      user-select: none;
    }
    .pg-num:hover { background: rgba(179,0,0,0.1); transform: translateY(-2px); }
    .pg-num.active {
      background: var(--darkred); color: var(--gold);
      border-color: var(--darkred); font-weight: 700;
    }

    .pg-ellipsis {
      color: var(--darkred); opacity: 0.5;
      font-size: 14px; letter-spacing: 2px; padding: 0 4px;
    }

    /* ===== 查看全部 ===== */
    .more-wrap {
      text-align: center; margin-top: 8px;
      opacity: 0; transform: translateY(20px);
      transition: opacity 0.8s 0.4s, transform 0.8s 0.4s;
    }
    .more-wrap.show { opacity: 1; transform: translateY(0); }

    .more-btn {
      display: inline-flex; align-items: center; gap: 10px;
      text-decoration: none; color: var(--red);
      border: 1.5px solid var(--red); padding: 12px 32px;
      border-radius: 8px; font-size: 15px; letter-spacing: 0.15em;
      transition: background 0.22s, color 0.22s;
      background: rgba(255,255,255,0.5);
    }
    .more-btn:hover { background: var(--red); color: white; }
    .more-btn::before { content: "★"; color: var(--gold); font-size: 14px; }
    .more-btn::after  { content: "★"; color: var(--gold); font-size: 14px; }

    /* ===== AI 悬浮按钮 ===== */
    #aiBtn {
      position: fixed; bottom: 28px; right: 28px;
      width: 62px; height: 62px;
      background: linear-gradient(135deg, #c0000a 0%, #7a0000 100%);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(140,0,0,0.45), 0 1px 4px rgba(0,0,0,0.18);
      transition: transform 0.22s cubic-bezier(0.34,1.56,0.64,1), box-shadow 0.22s ease;
      z-index: 9999;
      animation: aiBtnPulse 3s ease-in-out infinite;
    }
    #aiBtn:hover {
      transform: scale(1.1);
      box-shadow: 0 8px 32px rgba(180,0,0,0.55), 0 2px 8px rgba(0,0,0,0.22);
      animation: none;
    }
    #aiBtn::before {
      content: ''; position: absolute; inset: -4px;
      border-radius: 50%; border: 2px solid rgba(200,0,0,0.4);
      animation: aiRingPulse 3s ease-in-out infinite;
    }
    #aiBtn svg {
      width: 28px; height: 28px; fill: none; stroke: #fff;
      stroke-width: 1.8; stroke-linecap: round; stroke-linejoin: round;
      position: relative; z-index: 1;
    }
    #aiBtn::after {
      content: '★'; position: absolute; top: -5px; right: -3px;
      font-size: 13px; color: var(--gold); line-height: 1;
      filter: drop-shadow(0 1px 3px rgba(0,0,0,0.4));
      animation: starSpin 6s linear infinite;
    }
    @keyframes aiBtnPulse {
      0%, 100% { box-shadow: 0 4px 20px rgba(140,0,0,0.45), 0 1px 4px rgba(0,0,0,0.18); }
      50%       { box-shadow: 0 4px 30px rgba(190,0,0,0.65), 0 1px 4px rgba(0,0,0,0.18); }
    }
    @keyframes aiRingPulse {
      0%   { transform: scale(1);    opacity: 0.7; }
      60%  { transform: scale(1.18); opacity: 0; }
      100% { transform: scale(1);    opacity: 0; }
    }
    @keyframes starSpin {
      0%   { transform: rotate(0deg)   scale(1); }
      50%  { transform: rotate(180deg) scale(1.2); }
      100% { transform: rotate(360deg) scale(1); }
    }

    /* ===== 响应式 ===== */
    @media (max-width: 768px) {
      .sidebar { width: 100%; }
      .flag-bg  { font-size: 150vw; }
      #blog-cards { grid-template-columns: 1fr; }
      #aiBtn { width: 54px; height: 54px; bottom: 20px; right: 20px; }
      #aiBtn svg { width: 24px; height: 24px; }
      .pg-num { width: 32px; height: 32px; font-size: 11px; }
    }
  </style>
</head>
<body>

  <canvas id="meteorCanvas"></canvas>
  <div class="flag-bg">★</div>

  <div class="menu-btn" id="menuBtn">
    <span></span><span></span><span></span>
  </div>

  <div class="sidebar" id="sidebar">
    <a href="jieshao.html">关于我们</a>
    <a href="blog.html">文章查看</a>
    <a href="network.html">网安知识</a>
    <a href="download.html">文件下载</a>
    <a href="wenw/about.html">公示板块</a>
  </div>

  <div class="container">

    <header class="page-header" id="pageHeader">
      <span class="star-deco">★ ★ ★</span>
      <h1 class="page-title">最新文章</h1>
      <p class="page-subtitle">来自赤星的理论与记录</p>
      <div class="divider"><span class="divider-star">★</span></div>
    </header>

    <!-- 统计条 -->
    <div class="stats-bar" id="statsBar">
      <span>共 <span class="total" id="totalCount">—</span> 篇文章</span>
      <span class="page-info" id="pageInfo">第 — 页 / 共 — 页</span>
    </div>

    <!-- 卡片网格 -->
    <div id="blog-cards">
      <div class="loading-msg">
        <span class="loading-spinner">⟳</span> 文章加载中
      </div>
    </div>

    <!-- 分页 -->
    <div class="pagination" id="pagination"></div>

    <!-- 查看全部 -->
    <div class="more-wrap" id="moreWrap">
      <a href="https://paper.wf/meteor" class="more-btn" target="_blank">
        前往博客查看全部
      </a>
    </div>

  </div>

  <div id="aiBtn" title="打开 AI 对话">
    <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
      <path d="M12 3C7.03 3 3 6.69 3 11.2c0 2.4 1.1 4.57 2.88 6.1L5 21l3.9-1.72A10.1 10.1 0 0012 19.4c4.97 0 9-3.69 9-8.2S16.97 3 12 3z"/>
      <circle cx="8.5"  cy="11.2" r="1" fill="white" stroke="none"/>
      <circle cx="12"   cy="11.2" r="1" fill="white" stroke="none"/>
      <circle cx="15.5" cy="11.2" r="1" fill="white" stroke="none"/>
    </svg>
  </div>

  <script>
    /* =========================================================
       1. 菜单
    ========================================================= */
    const menuBtn = document.getElementById("menuBtn");
    const sidebar = document.getElementById("sidebar");
    menuBtn.onclick = () => {
      menuBtn.classList.toggle("active");
      sidebar.classList.toggle("active");
    };

    /* =========================================================
       2. 页头入场
    ========================================================= */
    setTimeout(() => {
      document.getElementById("pageHeader").classList.add("show");
    }, 300);

    /* =========================================================
       3. 分页状态
    ========================================================= */
    const PAGE_SIZE  = 6;   // 每页显示篇数（可按需调整）
    let   allArticles = []; // 全量文章缓存
    let   currentPage = 1;
    const articleContents = {}; // 缓存已加载的文章内容

    /* =========================================================
       4. WriteFreely RSS 读取（逻辑保持原样，去掉 i<5 限制）
    ========================================================= */
    fetch("https://paper.wf/meteor/feed/")
      .then(r => r.text())
      .then(str => new DOMParser().parseFromString(str, "text/xml"))
      .then(data => {
        data.querySelectorAll("item").forEach(el => {
          const title = el.querySelector("title").textContent;
          const link  = el.querySelector("link").textContent;
          const date  = new Date(el.querySelector("pubDate").textContent);
          const formattedDate =
            date.getFullYear() + "-" +
            String(date.getMonth() + 1).padStart(2, "0") + "-" +
            String(date.getDate()).padStart(2, "0");

          /* 摘要：从 description 提取纯文本,取前 120 字 */
          const descNode = el.querySelector("description");
          let summary = "";
          if (descNode) {
            const plain = (descNode.textContent || "")
              .replace(/<[^>]*>/g, "")
              .replace(/&nbsp;/g, " ").replace(/&amp;/g, "&")
              .replace(/&lt;/g, "<").replace(/&gt;/g, ">")
              .replace(/&quot;/g, '"').replace(/\s+/g, " ").trim();
            summary = plain.length > 120 ? plain.slice(0, 120) + "…" : plain;
          }

          allArticles.push({ title, link, formattedDate, summary });
        });

        if (allArticles.length === 0) {
          document.getElementById("blog-cards").innerHTML =
            '<div class="error-msg">暂无文章</div>';
          return;
        }

        document.getElementById("totalCount").textContent = allArticles.length;
        document.getElementById("statsBar").classList.add("show");
        renderPage(1);
      })
      .catch(() => {
        document.getElementById("blog-cards").innerHTML =
          '<div class="error-msg">★ 博客加载失败，请稍后重试 ★</div>';
      });

    /* =========================================================
       5. 渲染指定页
    ========================================================= */
    function renderPage(page) {
      const totalPages = Math.ceil(allArticles.length / PAGE_SIZE);
      page = Math.max(1, Math.min(page, totalPages));
      currentPage = page;

      const cardsEl = document.getElementById("blog-cards");
      const moreWr  = document.getElementById("moreWrap");

      /* 淡出 → 更新内容 → 淡入（通过 CSS transition） */
      cardsEl.classList.add("fading");

      setTimeout(() => {
        const start = (page - 1) * PAGE_SIZE;
        const slice = allArticles.slice(start, start + PAGE_SIZE);
        let html = "";

        slice.forEach((a, i) => {
          const globalIdx = start + i + 1;           // 全局序号，无上限
          const delay     = (i * 0.07).toFixed(2) + "s";
          const cardId    = `card-${globalIdx}`;
          html += `
            <div class="blog-card" id="${cardId}" data-index="${globalIdx}" data-link="${a.link}" style="animation-delay:${delay}">
              <div class="card-top-bar"></div>
              <div class="card-body">
                <div class="card-meta">
                  <span class="card-index">NO.${globalIdx}</span>
                  <span class="card-date">${a.formattedDate}</span>
                  <span class="expand-indicator">展开内容</span>
                </div>
                <div class="card-title">${a.title}</div>
                ${a.summary ? `<div class="card-summary">${a.summary}</div>` : ""}
              </div>
              <div class="card-content">
                <div class="content-inner" id="content-${globalIdx}">
                  <div class="content-loading">
                    <span class="loading-spinner">⟳</span> 加载中...
                  </div>
                </div>
              </div>
              <div class="card-footer">
                <a class="card-link" href="${a.link}" target="_blank" onclick="event.stopPropagation()">阅读全文</a>
              </div>
            </div>`;
        });

        cardsEl.innerHTML = html;
        cardsEl.classList.remove("fading");

        // 为每个卡片添加点击事件
        slice.forEach((a, i) => {
          const globalIdx = start + i + 1;
          const cardEl = document.getElementById(`card-${globalIdx}`);
          if (cardEl) {
            cardEl.addEventListener('click', (e) => {
              // 如果点击的是链接，不处理
              if (e.target.closest('.card-link')) return;
              toggleCard(cardEl, globalIdx, a.link);
            });
          }
        });

        document.getElementById("pageInfo").textContent =
          `第 ${page} 页 / 共 ${totalPages} 页`;

        renderPagination(page, totalPages);
        moreWr.classList.add("show");

        /* 翻页后平滑滚回列表顶部 */
        if (page !== 1) {
          document.getElementById("statsBar")
            .scrollIntoView({ behavior: "smooth", block: "start" });
        }
      }, 220);
    }

    /* =========================================================
       6. 卡片展开/收起逻辑
    ========================================================= */
    function toggleCard(cardEl, index, link) {
      const isExpanded = cardEl.classList.contains('expanded');
      
      if (isExpanded) {
        // 收起
        cardEl.classList.remove('expanded');
      } else {
        // 先收起其他已展开的卡片
        document.querySelectorAll('.blog-card.expanded').forEach(el => {
          el.classList.remove('expanded');
        });
        
        // 展开当前卡片
        cardEl.classList.add('expanded');
        
        // 如果内容未加载，则加载
        if (!articleContents[index]) {
          loadArticleContent(index, link);
        }
        
        // 平滑滚动到卡片顶部
        setTimeout(() => {
          cardEl.scrollIntoView({ behavior: 'smooth', block: 'start' });
        }, 100);
      }
    }

    /* =========================================================
       7. 加载文章内容
    ========================================================= */
    function loadArticleContent(index, link) {
      const contentEl = document.getElementById(`content-${index}`);
      
      fetch(link)
        .then(response => response.text())
        .then(html => {
          // 解析HTML
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');
          
          // 尝试提取文章内容（WriteFreely通常在article标签中）
          let content = doc.querySelector('article');
          
          if (!content) {
            // 如果没有article标签，尝试其他常见的内容容器
            content = doc.querySelector('.post-content') || 
                     doc.querySelector('.content') || 
                     doc.querySelector('main') ||
                     doc.body;
          }
          
          if (content) {
            // 移除标题（因为已在卡片中显示）
            const h1 = content.querySelector('h1');
            if (h1) h1.remove();
            
            // 清理可能的导航元素
            content.querySelectorAll('nav, header, footer').forEach(el => el.remove());
            
            // 缓存内容
            articleContents[index] = content.innerHTML;
            
            // 显示内容
            contentEl.innerHTML = articleContents[index];
          } else {
            contentEl.innerHTML = '<div class="content-error">无法加载文章内容</div>';
          }
        })
        .catch(error => {
          console.error('加载文章失败:', error);
          contentEl.innerHTML = '<div class="content-error">★ 加载失败，请点击"阅读全文"查看 ★</div>';
        });
    }

    /* =========================================================
       8. 分页控件渲染
          · 总页数 ≤ 7 → 显示全部页码
          · 总页数 > 7 → 首尾各 1，当前页两侧各 1，其余省略号
    ========================================================= */
    function renderPagination(cur, total) {
      const el = document.getElementById("pagination");

      if (total <= 1) {
        el.innerHTML = "";
        el.classList.remove("show");
        return;
      }

      /* 生成页码序列 */
      let pages = [];
      if (total <= 7) {
        for (let i = 1; i <= total; i++) pages.push(i);
      } else {
        const left  = Math.max(2, cur - 1);
        const right = Math.min(total - 1, cur + 1);
        pages.push(1);
        if (left > 2)          pages.push("…");
        for (let i = left; i <= right; i++) pages.push(i);
        if (right < total - 1) pages.push("…");
        pages.push(total);
      }

      let html =
        `<button class="pg-btn prev" ${cur === 1 ? "disabled" : ""}
           onclick="renderPage(${cur - 1})">上一页</button>`;

      html += '<div class="pg-numbers">';
      pages.forEach(p => {
        if (p === "…") {
          html += `<span class="pg-ellipsis">…</span>`;
        } else {
          html += `<div class="pg-num ${p === cur ? "active" : ""}"
                        onclick="renderPage(${p})">${p}</div>`;
        }
      });
      html += '</div>';

      html +=
        `<button class="pg-btn next" ${cur === total ? "disabled" : ""}
           onclick="renderPage(${cur + 1})">下一页</button>`;

      el.innerHTML = html;
      el.classList.add("show");
    }

    /* =========================================================
       9. AI 按钮
    ========================================================= */
    document.getElementById("aiBtn").addEventListener("click", () => {
      window.open("https://huggingface.co/spaces/rofg2/rotai", "_blank");
    });

    /* =========================================================
       10. 火流星特效（持续 15 秒）
    ========================================================= */
    (function () {
      const canvas = document.getElementById("meteorCanvas");
      const ctx    = canvas.getContext("2d");

      function resize() {
        canvas.width  = window.innerWidth;
        canvas.height = window.innerHeight;
      }
      resize();
      window.addEventListener("resize", resize);

      const DURATION   = 15000;
      const SPAWN_RATE = 220;
      const startTime  = performance.now();
      let   lastSpawn  = 0;
      const meteors    = [];
      const COLORS = [
        [255, 200,  40], [255, 140,  20],
        [255,  60,  20], [255, 240, 180],
      ];

      function spawnMeteor() {
        const fromRight = Math.random() > 0.3;
        meteors.push({
          x:       fromRight ? canvas.width * (0.5 + Math.random() * 0.7) : canvas.width * Math.random() * 0.5,
          y:       Math.random() * canvas.height * 0.55,
          angle:   Math.PI / 4 + (Math.random() - 0.5) * 0.5,
          speed:   12 + Math.random() * 18,
          length:  100 + Math.random() * 200,
          life:    0,
          maxLife: 0.6 + Math.random() * 0.4,
          col:     COLORS[Math.floor(Math.random() * COLORS.length)],
        });
      }

      function drawMeteor(m, alpha) {
        const tailX = m.x - Math.cos(m.angle) * m.length;
        const tailY = m.y - Math.sin(m.angle) * m.length;
        const grad  = ctx.createLinearGradient(tailX, tailY, m.x, m.y);
        const [r, g, b] = m.col;
        grad.addColorStop(0,   `rgba(${r},${g},${b},0)`);
        grad.addColorStop(0.6, `rgba(${r},${g},${b},${alpha * 0.4})`);
        grad.addColorStop(1,   `rgba(255,255,255,${alpha})`);
        ctx.save();
        ctx.globalCompositeOperation = "lighter";
        ctx.strokeStyle = grad; ctx.lineWidth = 2.5;
        ctx.shadowColor = `rgba(${r},${g},${b},${alpha})`; ctx.shadowBlur = 14;
        ctx.beginPath(); ctx.moveTo(tailX, tailY); ctx.lineTo(m.x, m.y); ctx.stroke();
        ctx.beginPath(); ctx.arc(m.x, m.y, 2.5, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(255,255,255,${alpha})`; ctx.shadowBlur = 20; ctx.fill();
        ctx.restore();
      }

      let prevTime = performance.now();
      function animate(now) {
        const elapsed = now - startTime;
        if (elapsed > DURATION && meteors.length === 0) {
          ctx.clearRect(0, 0, canvas.width, canvas.height);
          canvas.style.display = "none"; return;
        }
        const dt = (now - prevTime) / 1000; prevTime = now;
        if (elapsed < DURATION && now - lastSpawn > SPAWN_RATE) {
          spawnMeteor();
          if (Math.random() > 0.65) spawnMeteor();
          lastSpawn = now;
        }
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        for (let i = meteors.length - 1; i >= 0; i--) {
          const m = meteors[i];
          m.life += dt; m.x += Math.cos(m.angle) * m.speed; m.y += Math.sin(m.angle) * m.speed;
          const p = m.life / m.maxLife;
          const alpha = p < 0.15 ? p / 0.15 : p < 0.7 ? 1 : 1 - (p - 0.7) / 0.3;
          if (m.life >= m.maxLife || m.x > canvas.width + 200 || m.y > canvas.height + 200) {
            meteors.splice(i, 1); continue;
          }
          drawMeteor(m, Math.max(0, alpha));
        }
        requestAnimationFrame(animate);
      }
      requestAnimationFrame(animate);
    })();
  </script>
