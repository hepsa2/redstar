<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>访客投稿</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root {
  --red: #b30000;
  --darkred: #7a0000;
  --lightred: #fff0f0;
  --midred: #ffd6d6;
  --text: #1a1a1a;
  --muted: #666;
  --border: #e0b0b0;
  --radius: 8px;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: "Noto Sans SC", sans-serif;
  background: var(--lightred);
  color: var(--text);
  min-height: 100vh;
  padding: 40px 20px 60px;
}

.page-header {
  max-width: 780px;
  margin: 0 auto 36px;
  border-bottom: 3px solid var(--red);
  padding-bottom: 16px;
}

.page-header h1 {
  font-family: "Noto Serif SC", serif;
  font-size: 2rem;
  color: var(--red);
  letter-spacing: 0.05em;
}

.page-header p {
  margin-top: 8px;
  color: var(--muted);
  font-size: 0.95rem;
  line-height: 1.7;
}

.notice {
  max-width: 780px;
  margin: 0 auto 28px;
  background: #fff8e1;
  border-left: 4px solid #e6a800;
  border-radius: 0 var(--radius) var(--radius) 0;
  padding: 14px 18px;
  font-size: 0.9rem;
  color: #5a4000;
  line-height: 1.7;
}

.notice strong { color: #7a5800; }

.card {
  max-width: 780px;
  margin: 0 auto;
  background: #fff;
  border-radius: var(--radius);
  border: 1px solid var(--border);
  padding: 36px 40px;
  box-shadow: 0 4px 24px rgba(179,0,0,0.07);
}

.form-group { margin-bottom: 22px; }

label {
  display: block;
  font-weight: 700;
  font-size: 0.92rem;
  color: var(--darkred);
  margin-bottom: 7px;
  letter-spacing: 0.03em;
}

label .hint {
  font-weight: 400;
  color: var(--muted);
  font-size: 0.85rem;
  margin-left: 6px;
}

input[type=text],
textarea,
select {
  width: 100%;
  padding: 11px 14px;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  font-size: 0.97rem;
  font-family: "Noto Sans SC", sans-serif;
  color: var(--text);
  background: #fff;
  transition: border-color 0.2s, box-shadow 0.2s;
  outline: none;
}

input[type=text]:focus,
textarea:focus,
select:focus {
  border-color: var(--red);
  box-shadow: 0 0 0 3px rgba(179,0,0,0.10);
}

textarea {
  resize: vertical;
  min-height: 220px;
  line-height: 1.7;
}

.captcha-row {
  display: flex;
  align-items: center;
  gap: 12px;
}

.captcha-box {
  display: inline-block;
  background: var(--midred);
  color: var(--darkred);
  font-weight: 700;
  font-size: 1.4rem;
  font-family: "Noto Serif SC", serif;
  letter-spacing: 0.25em;
  padding: 8px 20px;
  border-radius: var(--radius);
  border: 2px dashed var(--border);
  min-width: 110px;
  text-align: center;
  user-select: none;
  flex-shrink: 0;
}

.captcha-input {
  flex: 1;
}

.submit-btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  margin-top: 8px;
  padding: 13px 32px;
  background: var(--red);
  color: #fff;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  font-size: 1rem;
  font-family: "Noto Sans SC", sans-serif;
  font-weight: 700;
  letter-spacing: 0.05em;
  transition: background 0.2s, transform 0.1s;
}

.submit-btn:hover { background: var(--darkred); }
.submit-btn:active { transform: scale(0.98); }

.submit-btn svg {
  width: 18px; height: 18px;
  fill: none;
  stroke: currentColor;
  stroke-width: 2;
  stroke-linecap: round;
  stroke-linejoin: round;
  flex-shrink: 0;
}

.msg {
  display: none;
  margin-top: 16px;
  padding: 13px 16px;
  border-radius: var(--radius);
  font-size: 0.92rem;
  line-height: 1.6;
}

.msg.error   { display: block; background: #fff0f0; border: 1px solid #f5b0b0; color: #900; }
.msg.success { display: block; background: #f0fff4; border: 1px solid #86d9a8; color: #1a6b3a; }

.divider {
  border: none;
  border-top: 1px solid var(--midred);
  margin: 28px 0;
}

.char-count {
  text-align: right;
  font-size: 0.8rem;
  color: var(--muted);
  margin-top: 4px;
}
.char-count.warn { color: #c07000; }

.footer-note {
  max-width: 780px;
  margin: 28px auto 0;
  font-size: 0.82rem;
  color: var(--muted);
  text-align: center;
  line-height: 1.8;
}
</style>
</head>
<body>

<header class="page-header">
  <h1>✍ 访客投稿</h1>
  <p>填写标题、内容并选择栏目。提交后将跳转到 GitHub，请在 GitHub 页面点击「Submit new issue」完成投稿，管理员审核通过后即可发布。</p>
</header>

<div class="notice">
  <strong>⚠ 须知：</strong>提交投稿需要拥有 <strong>GitHub 账号</strong>并登录。点击「提交」后会跳转至 GitHub Issue 预填页面，请确认内容无误后点击「Submit new issue」。管理员将在 Issue 中回复审核结果。
</div>

<div class="card">
  <div class="form-group">
    <label for="title">文章标题 <span class="hint">最多 60 字</span></label>
    <input type="text" id="title" maxlength="60" placeholder="请输入文章标题…" autocomplete="off">
  </div>

  <div class="form-group">
    <label for="category">投稿栏目</label>
    <select id="category">
      <option value="A">【访客】时事评论/组织实践</option>
      <option value="B">【访客】理论分析/名著解读</option>
      <option value="C">【访客】国际新闻/文艺作品</option>
    </select>
  </div>

  <div class="form-group">
    <label for="content">正文 <span class="hint">支持 Markdown，最多 5000 字</span></label>
    <textarea id="content" maxlength="5000" placeholder="在此输入正文内容…"></textarea>
    <div class="char-count" id="charCount">0 / 5000</div>
  </div>

  <hr class="divider">

  <div class="form-group">
    <label>验证码 <span class="hint">请在右侧输入框填写左边显示的数字</span></label>
    <div class="captcha-row">
      <div class="captcha-box" id="captchaDisplay" aria-label="验证码"></div>
      <input type="text" class="captcha-input" id="captcha" placeholder="输入验证码" maxlength="6" autocomplete="off" inputmode="numeric">
    </div>
  </div>

  <button class="submit-btn" id="submitBtn" type="button">
    <svg viewBox="0 0 24 24"><path d="M22 2L11 13"/><path d="M22 2L15 22 11 13 2 9l20-7z"/></svg>
    提交投稿（跳转 GitHub）
  </button>

  <div class="msg error" id="errorMsg"></div>
  <div class="msg success" id="successMsg"></div>
</div>

<p class="footer-note">
  本页面基于 GitHub Issues 实现无服务器投稿。投稿内容公开可见，请勿填写个人隐私信息。
</p>

<script>
/* ========== 配置区 ========== */
const REPO = "hepsa2/mlmpm"; // ← 修改为你的 owner/repo

/* ========== 验证码 ========== */
let captchaNum = Math.floor(Math.random() * 9000) + 1000;
document.getElementById("captchaDisplay").innerText = captchaNum;

/* ========== 字数统计 ========== */
const contentEl   = document.getElementById("content");
const charCountEl = document.getElementById("charCount");
contentEl.addEventListener("input", () => {
  const len = contentEl.value.length;
  charCountEl.innerText = `${len} / 5000`;
  charCountEl.className = "char-count" + (len > 4500 ? " warn" : "");
});

/* ========== 提交逻辑 ========== */
document.getElementById("submitBtn").addEventListener("click", () => {
  const errorMsg   = document.getElementById("errorMsg");
  const successMsg = document.getElementById("successMsg");
  errorMsg.className   = "msg";
  successMsg.className = "msg";

  const title    = document.getElementById("title").value.trim();
  const category = document.getElementById("category").value;
  const content  = document.getElementById("content").value.trim();
  const captcha  = document.getElementById("captcha").value.trim();

  /* 校验 */
  if (!title) {
    errorMsg.className = "msg error";
    errorMsg.innerText = "❌ 请填写文章标题。";
    return;
  }
  if (!content) {
    errorMsg.className = "msg error";
    errorMsg.innerText = "❌ 正文不能为空。";
    return;
  }
  if (captcha !== String(captchaNum)) {
    errorMsg.className = "msg error";
    errorMsg.innerText = "❌ 验证码错误，请重新输入。";
    /* 刷新验证码 */
    captchaNum = Math.floor(Math.random() * 9000) + 1000;
    document.getElementById("captchaDisplay").innerText = captchaNum;
    document.getElementById("captcha").value = "";
    return;
  }

  /* 构造 Issue 标题与正文 */
  const safeTitle  = title.replace(/[^\w\u4e00-\u9fa5\-]/g, "_");
  const filename   = `${safeTitle}.md`;

  const issueTitle = `[投稿][${category}] ${title}`;
  const issueBody  =
    `---\n文件名: ${filename}\n栏目: ${category}\n---\n\n${content}`;

  /* 跳转到 GitHub 预填 Issue 页面 */
  const url = `https://github.com/${REPO}/issues/new`
    + `?title=${encodeURIComponent(issueTitle)}`
    + `&body=${encodeURIComponent(issueBody)}`
    + `&labels=${encodeURIComponent("投稿")}`;

  successMsg.className = "msg success";
  successMsg.innerHTML = "✅ 正在跳转到 GitHub……请在新页面确认内容后点击「Submit new issue」完成投稿。";

  setTimeout(() => { window.open(url, "_blank"); }, 800);
});
</script>
</body>
</html>
